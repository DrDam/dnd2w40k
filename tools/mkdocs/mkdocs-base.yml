theme:
  name: material
  features:
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      toc_depth: 2

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/colspan_tables.py

validation:
  nav:
    omitted_files: ignore
