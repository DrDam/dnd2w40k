site_name: Warhammer 40 000 conversion
site_url: https://DrDam.github.io/dnd2w40k/
theme:
  name: material
  features:
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      toc_depth: 2

nav:
  - A propos : index.md
  - Note préliminaire : 0-disclaimer.md
  - "Livre 1 : Manuel du joueur":
      - 1. Préambule: I.Manuel-joueur/0-preambule.md
      - 2. Les personnages, étape par étape: I.Manuel-joueur/1-perso.md
      - 3. Les espèces:
        - Les Espèces: I.Manuel-joueur/Especes/especes.md
        - L'humanité:
            - A propos : I.Manuel-joueur/Especes/humanite.md
            - Les Blanks: I.Manuel-joueur/Especes/11-Blank.md
            - Les hommes-bètes: I.Manuel-joueur/Especes/11-Homme-betes.md
            - Les humains: I.Manuel-joueur/Especes/11-Humain.md
            - Les Mutants: I.Manuel-joueur/Especes/11-Mutant.md
            - Les Ogryns: I.Manuel-joueur/Especes/11-Ogryn.md
  - "Livre 2 : Manuel du Maitre du jeu":
      - avant-propos: II.Manuel-MJ/index.md
  - "Livre 3 : Manuel des montres":
      - avant-propos: III.Manuel-Monstres/index.md


extra_css:
  - stylesheets/extra.css
