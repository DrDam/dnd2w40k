name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  pdf:
    runs-on: ubuntu-latest
    needs: [mkdocs]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Build PDF
        run: |
          mkdir -p build
          pandoc docs/*.md \
          -o build/dnd-rules.pdf \
          --toc \
          --number-sections \
          --pdf-engine=xelatex \
          --metadata-file=book/metadata.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-rules-pdf
          path: build/dnd-rules.pdf

  mkdocs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install mkdocs mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Build MkDocs
        run: mkdocs build

      - name: Deploy wiki
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  deploy_pdf:
    runs-on: ubuntu-latest
    needs: [mkdocs, pdf]

    steps:
    - name: Publish PDF into MkDocs
      run: |
        mkdir -p docs/assets
        cp build/dnd-rules.pdf docs/assets/
