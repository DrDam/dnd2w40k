name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install mkdocs mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Build MkDocs
        run: mkdocs build

      - name: Build PDF
        run: |
          chmod +x book/book.sh
          ./book/book.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-rules-pdf
          path: build/dnd-rules.pdf

      - name: Publish PDF into MkDocs
        run: |
          mkdir -p site/assets/files
          cp build/dnd-rules.pdf site/assets/files/

      - name: Deploy wiki
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
