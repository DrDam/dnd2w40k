name: Build

on:
  push:
    branches: [main]

jobs:
  pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Build PDF
        run: |
          mkdir -p build
          pandoc docs/*.md \
          -o build/dnd-rules.pdf \
          --toc \
          --number-sections \
          --pdf-engine=xelatex \
          --metadata-file=book/metadata.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-rules-pdf
          path: build/dnd-rules.pdf

